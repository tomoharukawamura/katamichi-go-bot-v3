name: Deploy

on:
  push:
    branches:
      - sta
      - main
    paths-ignore:
      - "terraform/**"
      - ".github/**"

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: katamichi-go-bot
  ECS_CLUSTER: katamichi-bot

jobs:
  # sta ブランチ: イメージビルド → ECR push → ECS sta 更新
  deploy-sta:
    if: github.ref == 'refs/heads/sta'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image (linux/arm64)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker buildx create --use
          docker buildx build \
            --platform linux/arm64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push .

      - name: Deploy to ECS sta
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service katamichi-bot-sta \
            --force-new-deployment

  # main ブランチ: ECR の latest イメージで ECS pro を更新（ビルドなし）
  deploy-pro:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to ECS pro
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service katamichi-bot-pro \
            --force-new-deployment
